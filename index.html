<!DOCTYPE html>
<html lang="de">

<head>
<meta charset="UTF-8">
<title>BAFA Antrag – Energieberatung Braunschweig</title>

<style>
  body {
    font-family: Arial;
    background-color: #f5f7fa;
    padding: 20px;
  }

  .container {
    background: white;
    padding: 25px;
    border-radius: 10px;
    max-width: 600px;
    margin: auto;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  h1 { text-align: center; }
  h2 { margin-top: 25px; }

  input, select {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    margin-bottom: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
  }

  button {
    margin-top: 15px;
    padding: 12px;
    background: #007BFF;
    color: white;
    border: none;
    border-radius: 5px;
    width: 100%;
    cursor: pointer;
    font-size: 16px;
  }

  button:hover {
    background: #0056b3;
  }

  #form {
    display: none;
  }

  #mfhBlock {
    display: none;
  }

  #investAdresse {
    display: none;
  }
</style>

</head>

<body>

<div class="container">

<h1>Kundendatenerfassung für BAFA Fördermittel</h1>

<!-- MAßNAHME -->
<label><b>Welche Maßnahme soll durchgeführt werden?</b></label>
<select id="massnahme" onchange="showForm()">
  <option value="">Bitte auswählen</option>
  <option>Fenster und Türen erneuern</option>
  <option>Fassade dämmen</option>
  <option>Dach und oberste Geschossdecke dämmen</option>
</select>

<!-- FORMULAR -->
<form id="form" onsubmit="return false;">

<h2>Kundendaten</h2>

<label>Vorname:
<input type="text" id="vorname">
</label>

<label>Nachname:
<input type="text" id="nachname">
</label>

<label>E-Mail:
<input type="email" id="email">
</label>

<label>Telefonnummer:
<input type="text" id="telefon">
</label>

<h2>Adresse (Wohnort)</h2>

<label>Straße:
<input type="text" id="strasse">
</label>

<label>Hausnummer:
<input type="text" id="hausnummer">
</label>

<label>PLZ:
<input type="text" id="plz">
</label>

<label>Ort:
<input type="text" id="ort">
</label>

<!-- INVESTITIONSOBJEKT -->
<h2>Investitionsobjekt</h2>

<label>Entspricht die Adresse dem Wohnort?</label>
<select id="sameAdresse" onchange="checkAdresse()">
  <option value="">Bitte auswählen</option>
  <option value="ja">Ja</option>
  <option value="nein">Nein</option>
</select>

<div id="investAdresse">

<label>Straße:
<input type="text" id="i_strasse">
</label>

<label>Hausnummer:
<input type="text" id="i_hausnummer">
</label>

<label>PLZ:
<input type="text" id="i_plz">
</label>

<label>Ort:
<input type="text" id="i_ort">
</label>

</div>

<!-- GEBÄUDEDATEN -->
<h2>Gebäudedaten</h2>

<label>Gebäudetyp:
<select id="gebaeudetyp" onchange="checkGebaeude()">
  <option value="">Bitte auswählen</option>
  <option value="efh">Einfamilienhaus</option>
  <option value="mfh">Mehrfamilienhaus</option>
  <option value="efh">Doppelhaushälfte</option>
  <option value="efh">Reihenhaus</option>
</select>
</label>

<label>Baujahr:
<input type="number" id="baujahr">
</label>

<!-- nur bei MFH -->
<div id="mfhBlock">

<label>Anzahl Wohneinheiten:
<input type="number" id="wohneinheiten">
</label>

<label>von der Sanierung betroffene Wohneinheiten:
<input type="number" id="betroffene_wohneinheiten">
</label>

</div>

<button type="button" onclick="finishForm()">
  Antrag abschließen
</button>

</form>

</div>

<script>

// Formular anzeigen
function showForm() {
  var v = document.getElementById("massnahme").value;
  if (v !== "") {
    document.getElementById("form").style.display = "block";
  }
}

// Gebäude-Logik
function checkGebaeude() {
  var type = document.getElementById("gebaeudetyp").value;

  if (type === "mfh") {
    document.getElementById("mfhBlock").style.display = "block";
  } else {
    document.getElementById("mfhBlock").style.display = "none";
  }
}

// Investitionsadresse
function checkAdresse() {
  var val = document.getElementById("sameAdresse").value;

  if (val === "nein") {
    document.getElementById("investAdresse").style.display = "block";
  } else {
    document.getElementById("investAdresse").style.display = "none";
  }
}

// Abschluss
function finishForm() {

  var vorname = document.getElementById("vorname").value;
  var nachname = document.getElementById("nachname").value;

  if (vorname === "" || nachname === "") {
    alert("Bitte alle Pflichtfelder ausfüllen");
    return;
  }

  alert("Ihre Daten wurden DSGVO-konform übermittelt. Ein Mitarbeiter der Energieberatung Braunschweig wird sich bei Ihnen zeitnah melden und die nächsten Schritte besprechen.");
}

</script>

</body>
</html>
``
