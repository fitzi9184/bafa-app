<!DOCTYPE html>
<html lang="de">

<head>
<meta charset="UTF-8">
<title>BAFA Antrag – Energieberatung Braunschweig</title>

<style>
  body {
    font-family: Arial;
    max-width: 600px;
    margin: auto;
  }

  #form {
    display: none;
  }

  #adresseBlock {
    display: none;
  }
</style>

</head>

<body>

<h1>Kundendatenerfassung für BAFA Fördermittel</h1>

<!-- STEP 1 -->
<p>
<b>Welche Maßnahme soll durchgeführt werden?</b><br><br>

<select id="massnahme">
  <option value="">Bitte auswählen</option>
  <option value="Fenster">Fenster</option>
  <option value="Dämmung">Dämmung</option>
  <option value="Dach">Dach</option>
</select>

<br><br>

<button onclick="showForm()">Weiter</button>
</p>

<!-- STEP 2 -->
<form id="form" onsubmit="return false;">

<h2>Kundendaten</h2>

<label>Vorname:<br>
<input type="text" id="vorname">
</label>

<br><br>

<label>Nachname:<br>
<input type="text" id="nachname">
</label>

<br><br>

<button type="button" onclick="nextStep()">
  Weiter
</button>

<!-- STEP 3 -->
<div id="adresseBlock">

<h2>Adresse</h2>

<label>Straße:<br>
<input type="text" id="strasse">
</label>

<br><br>

<label>Hausnummer:<br>
<input type="text" id="hausnummer">
</label>

<br><br>

<label>PLZ:<br>
<input type="text" id="plz">
</label>

<br><br>

<label>Ort:<br>
<input type="text" id="ort">
</label>

<br><br>

<button type="button" onclick="nextAdresse()">
  Weiter
</button>

</div>

</form>

<!-- SCRIPT -->
<script>

// STEP 1 → Formular anzeigen
function showForm() {
  var value = document.getElementById("massnahme").value;

  if (value === "") {
    alert("Bitte zuerst eine Maßnahme auswählen");
    return;
  }

  document.getElementById("form").style.display = "block";
}

// STEP 2 → Name prüfen → Adresse anzeigen
function nextStep() {
  var vorname = document.getElementById("vorname").value;
  var nachname = document.getElementById("nachname").value;

  if (vorname === "" || nachname === "") {
    alert("Bitte Vor- und Nachnamen eingeben");
    return;
  }

  document.getElementById("adresseBlock").style.display = "block";
}

// STEP 3 → Adresse prüfen
function nextAdresse() {
  var strasse = document.getElementById("strasse").value;
  var hausnummer = document.getElementById("hausnummer").value;
  var plz = document.getElementById("plz").value;
  var ort = document.getElementById("ort").value;

  if (strasse === "" || hausnummer === "" || plz === "" || ort === "") {
    alert("Bitte Adresse vollständig ausfüllen");
    return;
  }

  alert("Adresse gespeichert ✅ Nächster Schritt: Gebäudedaten");
}

</script>

</body>
</html>
