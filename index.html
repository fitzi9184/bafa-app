<!DOCTYPE html>
<html lang="de">

<head>
<meta charset="UTF-8">
<title>BAFA Antrag – Energieberatung Braunschweig</title>

<style>
  body {
    font-family: Arial;
    max-width: 600px;
    margin: auto;
  }

  .hidden {
    display: none;
  }
</style>

</head>

<body>

<h1>Kundendatenerfassung für BAFA Fördermittel</h1>

<p>
<b>Welche Maßnahme soll durchgeführt werden?</b><br><br>

<select id="massnahme">
  <option value="">Bitte auswählen</option>
  <option value="Fenster">Fenster</option>
  <option value="Dämmung">Dämmung</option>
  <option value="Dach">Dach</option>
</select>

<button onclick="showForm()">Weiter</button>
</p>

<form id="form" class="hidden">

<h2>Kundendaten</h2>

<label>Name:<br>
<input type="text">
</label>

</form>

<!-- SCRIPT GANZ UNTEN -->
<script>
function showForm() {
  var select = document.getElementById("massnahme");
  var value = select.value;

  if (value !== "") {
    document.getElementById("form").style.display = "block";
  }
}
</script>

</body>
</html>
