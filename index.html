<!DOCTYPE html>
<html lang="de">

<head>
<meta charset="UTF-8">
<title>BAFA Antrag</title>

<style>
  body {
    font-family: Arial;
    max-width: 600px;
    margin: auto;
  }

  #form {
    display: none;
  }
</style>

</head>

<body>

<h1>Kundendatenerfassung für BAFA Fördermittel</h1>

<p>
<b>Welche Maßnahme soll durchgeführt werden?</b><br><br>

<select id="massnahme">
  <option value="">Bitte auswählen</option>
  <option value="Fenster">Fenster</option>
  <option value="Dämmung">Dämmung</option>
  <option value="Dach">Dach</option>
</select>

<br><br>
<button onclick="showForm()">Weiter</button>
</p>

<!-- FORMULAR -->
<form id="form" onsubmit="return false;">

<h2>Kundendaten</h2>

<label>Name:<br>
<input type="text" id="name">
</label>

<br><br>

<button type="button" onclick="nextStep()">
  Weiter
</button>

</form>

<script>
function showForm() {
  var value = document.getElementById("massnahme").value;

  if (value === "") {
    alert("Bitte zuerst eine Maßnahme auswählen");
    return;
  }

  document.getElementById("form").style.display = "block";
}

// nächster Schritt nach Name
function nextStep() {
  var name = document.getElementById("name").value;

  if (name === "") {
    alert("Bitte Namen eingeben");
    return;
  }

  alert("Danke " + name + "! Nächster Schritt kommt.");
}
</script>

</body>
</html>
